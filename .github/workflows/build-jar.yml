name: Build NanoLimbo and upload jar to Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean shadowJar

      - name: Prepare JAR
        id: prepare_jar
        run: |
          # 找到编译生成的 shadowJar (包含所有依赖的包)
          JAR_PATH=$(find build/libs -name "*-all.jar" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            JAR_PATH=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -n 1)
          fi
          cp "$JAR_PATH" ./server.jar
          echo "JAR_SIZE=$(ls -lh ./server.jar | awk '{print $5}')" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoLimbo-artifact
          path: server.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: NanoLimbo-artifact

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "server.jar"
          tag: "v${{ github.run_number }}"
          name: "Official-Hy2-Release-${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          body: "这是鱼哥的官方纯净版 Hy2 服务端，由 GitHub Actions 自动构建。"
